<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1322"/>
      <stop offset="1" stop-color="#16213b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#ff8a5c"/>

  <text x="80" y="150" fill="#8fb0ff" font-size="26" font-weight="700" letter-spacing="6">A SAFE-RUST LUA RUNTIME</text>

  <text x="76" y="320" font-size="190" font-weight="800" letter-spacing="-4">
    <tspan fill="#ffffff">lua</tspan><tspan fill="#ff8a5c">-rs</tspan>
  </text>

  <text x="80" y="400" fill="#c4cde0" font-size="44" font-weight="600">Lua 5.4.7, reimplemented in safe Rust.</text>

  <g font-size="30" font-weight="700">
    <rect x="80"  y="450" width="290" height="64" rx="12" fill="rgba(255,255,255,0.06)" stroke="#2e3b57"/>
    <text x="110" y="491" fill="#0fd18f">44 / 44</text>
    <text x="250" y="491" fill="#8c99b3" font-weight="500" font-size="26">upstream tests</text>

    <rect x="392" y="450" width="250" height="64" rx="12" fill="rgba(255,255,255,0.06)" stroke="#2e3b57"/>
    <text x="420" y="491" fill="#ffffff">no C runtime</text>

    <rect x="664" y="450" width="436" height="64" rx="12" fill="rgba(255,255,255,0.06)" stroke="#2e3b57"/>
    <text x="692" y="491" fill="#e7ecf6" font-family="monospace" font-size="28">$ cargo install lua-cli</text>
  </g>

  <text x="80" y="575" fill="#6f7e9c" font-size="26" font-weight="600">github.com/ianm199/lua-rs-port</text>
</svg>
