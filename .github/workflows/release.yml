name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: verify (tag + rust + conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: tag matches workspace version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "$tag" != "$ver" ]; then
            echo "tag v$tag does not match workspace version $ver" >&2
            exit 1
          fi
          echo "releasing v$ver"
      - name: make test
        run: make test

  windows-build:
    name: build + test on windows (msvc)
    needs: verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Gate releases on a real Windows compile AND test run. The published
      # crates must build on the MSVC target (issue #90: `os.date` local-offset
      # used `localtime_r`/`tm_gmtoff`, both absent on Windows; issue #308:
      # `libc::localtime_s` is a CRT header-inline name, not a linker symbol —
      # a build-only gate on one toolchain missed it for five releases).
      # Running the workspace tests here is the only place the suite executes
      # on Windows at all — reference-binary oracle tests self-skip when
      # /tmp/lua-refs is absent, so this exercises the baked-constant oracle
      # and unit tests. Excludes the wasm-only crates, which are not published
      # to crates.io and ship via the npm/wasm path.
      - name: cargo build (workspace, windows)
        run: cargo build --locked --workspace --exclude lua-wasm --exclude lua-wasm-smoke
      - name: cargo test (workspace, windows)
        run: cargo test --locked --workspace --exclude lua-wasm --exclude lua-wasm-smoke

  publish-crates:
    name: publish to crates.io
    needs: [verify, windows-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish (dependency order, idempotent)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME#v}"
          published() {
            local n="$1"
            local path="${n:0:2}/${n:2:2}/$n"
            curl -sf "https://index.crates.io/$path" | grep -q "\"vers\":\"$ver\""
          }
          for c in \
            lua-gc lua-types lua-vm lua-code lua-coro lua-lex lua-parse \
            lua-rs-lfs lua-stdlib lua-rs-derive omnilua \
            lua-rs-hlua-shim omnilua-cli; do
            if published "$c"; then
              echo "already on crates.io, skipping: $c@$ver"
              continue
            fi
            echo "::group::publish $c@$ver"
            cargo publish -p "$c"
            echo "::endgroup::"
          done

  publish-wasm:
    name: publish omnilua (npm)
    # Gated on windows-build like publish-crates, so a Windows failure cannot
    # leave npm published at a version crates.io never got (half-released skew).
    needs: [verify, windows-build]
    uses: ./.github/workflows/npm-publish-wasm.yml
    with:
      dry_run: false
      tag: latest
    secrets: inherit

  github-release:
    name: github release
    needs: [publish-crates, publish-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: create release if absent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists, leaving it as is"
          else
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --generate-notes \
              --title "$GITHUB_REF_NAME"
          fi

  dashboard:
    name: update perf dashboard
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Check out main (== the tag commit at release time) so the dashboard
      # commit and the ledger's HEAD-keyed bench rows both land on main.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
      - name: benchmark and regenerate dashboard
        # `make perf` builds reference C (guess) + lua-rs, then runs
        # compare.sh, which appends ours/reference-C ratio rows (keyed by
        # HEAD) to harness/evidence/ledger.jsonl. Ratios are measured on the
        # same runner, so they are hardware-independent and slot into the
        # existing trajectory regardless of CI runner variance.
        #
        # `make perf-pgo` then builds the PGO binary (pinned training set),
        # conformance-gates it (full official suite), and appends
        # variant=pgo ledger rows — the headline numbers. The dashboard
        # trend stays stock-only (history.py filters variants), so the two
        # series never silently mix.
        run: |
          make perf
          make perf-pgo
          python3 harness/bench/history.py
      - name: commit dashboard to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add harness/evidence/ledger.jsonl \
                  harness/bench/history/index.html \
                  harness/bench/history/history.json
          git add harness/bench/results 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no dashboard changes to commit"
          else
            git commit -m "perf(dashboard): auto-update for ${GITHUB_REF_NAME} [skip ci]"
            git push origin HEAD:main \
              || echo "dashboard push failed (main moved during release); regenerate manually"
          fi
