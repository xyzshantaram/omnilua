name: Publish lua-rs-wasm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of publishing"
        required: true
        default: true
        type: boolean
      tag:
        description: "npm dist-tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - next

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: publish lua-rs-wasm
    runs-on: ubuntu-latest
    steps:
      - name: require main branch
        run: |
          if [ "$GITHUB_REF" != "refs/heads/main" ]; then
            echo "This workflow must run from main; got $GITHUB_REF" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: require npm token
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing NPM_TOKEN repository secret. Create an npm publish token for the intended package owner, then add it with: gh secret set NPM_TOKEN" >&2
            exit 1
          fi

      - name: npm identity
        if: ${{ !inputs.dry_run }}
        working-directory: packages/lua-rs-wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm whoami

      - uses: Swatinem/rust-cache@v2

      - name: verify package gate
        run: WASM_SKIP_BROWSER=1 ./harness/check_wasm_package.sh

      - name: npm publish dry-run
        if: ${{ inputs.dry_run }}
        working-directory: packages/lua-rs-wasm
        run: npm publish --dry-run --access public --tag "${{ inputs.tag }}"

      - name: npm publish
        if: ${{ !inputs.dry_run }}
        working-directory: packages/lua-rs-wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag "${{ inputs.tag }}"

      - name: verify registry install
        if: ${{ !inputs.dry_run }}
        working-directory: packages/lua-rs-wasm
        run: npm run test:registry
