name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  tests:
    name: tests (rust + conformance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: make test
        run: make test

  wasm-package:
    name: wasm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: Swatinem/rust-cache@v2
      - name: wasm package gate
        run: WASM_SKIP_BROWSER=1 ./harness/check_wasm_package.sh

  unsafe-budget:
    name: unsafe budget gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: enforce per-crate unsafe ceilings
        run: bash .claude/hooks/unsafe-budget.sh
