benchmarks = []
security_cases = []

[[capability]]
id = "gc-cycle-convergence"
description = "GC trace fixed-point converges on cyclic references through thread upvalue mirrors (twups / cross_thread_upvals); barrier predicates (keep_invariant, is_sweep_phase) reflect real phase state."
