schema_version = 1
target = "lua"
upstream_commit = "5.4.7"
rust_binary = "target/debug/lua-rs"

[[capability]]
id = "lua-official-suite-pass"
description = "All 44 PUC-Rio Lua 5.4.7 official tests pass under user-mode (_U=true) via harness/run_official_all.sh."
phase = 6
owners = ["lua-vm", "lua-gc", "lua-stdlib", "lua-coro", "lua-cli"]
architecture_objects = ["LuaState", "GlobalState", "Heap", "CallInfo", "Coroutine", "UpVal", "Table"]
fixtures = ["api", "attrib", "big", "bitwise", "bwcoercion", "calls", "closure", "code", "constructs", "coroutine", "cstack", "db", "errors", "events", "files", "gc", "gengc", "goto", "heavy", "literals", "locals", "main", "math", "nextvar", "pm", "sort", "strings", "tpack", "tracegc", "utf8", "vararg", "verybig"]
benchmarks = []
security_cases = []

[[capability]]
id = "yield-through-c-frames"
description = "Resume side of coroutines correctly continues C-frames marked CIST_YPCALL / CIST_CLSRET via finishCcall, supporting yield-through-pcall and yield-in-__close."
