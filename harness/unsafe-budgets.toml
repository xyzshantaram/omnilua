# Per-crate unsafe-block ceilings. Enforced by .claude/hooks/unsafe-budget.sh.
#
# Default ceiling outside this list: 0. Raising a ceiling requires editing
# this file in a commit that explains why. See HARNESS_DESIGN.md §3.

[crates]
"lua-types"  = 0
"lua-lex"    = 0
"lua-parse"  = 0
"lua-code"   = 0
"lua-vm"     = 0
"lua-stdlib" = 0
"lua-rs-runtime" = 5 # Re-entrant embedding boundary + scope API.
                     # 1 block: dereferences the active LuaState pointer while
                     #   the outer VM call frame is suspended inside a Rust
                     #   callback.
                     # 2026-05-28: raised 1 to 5 for the scope API (v0.0.10,
                     #   PRs #27/#29). The 4 added blocks:
                     #   - ScopedRef::deref / ScopedRefMut::deref / deref_mut:
                     #     NonNull reborrow of a &'scope mut T whose validity
                     #     is guarded by the cell's borrow flag; nulled on
                     #     scope drop so post-scope access errors cleanly.
                     #   - Scope::install_function: transmute laundering a
                     #     `+ 'scope` boxed closure to `+ 'static`; the box is
                     #     owned by a cell that drops it (and its captures)
                     #     when the scope ends.
                     #   All four carry `// SAFETY:` notes and are exercised
                     #   under Miri (Stacked + Tree Borrows) via the
                     #   scope_cell_* / scope_fn_cell_* tests, zero UB.
"lua-gc"     = 14   # production heap/collector substrate. Historical
                    # reference-only partial ports were removed from src/ so
                    # this ceiling tracks only active heap.rs unsafe. Each
                    # block remains a raw-pointer op required by the current
                    # mark-and-sweep architecture. +1 (13→14) for
                    # BootstrapScope::drop's NonNull<Heap> deref — the RAII
                    # end of a bootstrap window, same pointer contract as
                    # HeapGuard (heap outlives the scope, single-threaded).
"lua-coro"   = 0    # no active unsafe implementation; raise only with a
                    # future stackful coroutine backend.
"lua-cli"    = 6    # libloading dynlib backend (5) + os.date local-offset FFI (localtime_r/localtime_s, #90).
                    # 2026-05-23: raised 4 to 5. Real `unsafe { ... }` blocks
                    # in dynlib_*_hook: Library::new + 2× Symbol::get = 3
                    # blocks. The hook also counts the `unsafe extern "C" fn`
                    # type form used in `Symbol<unsafe extern "C" fn()>` —
                    # twice now (resolver + invoker call sites), each as a
                    # type annotation rather than an `unsafe { }` scope. The
                    # ceiling tracks the hook's regex count, not a semantic
                    # block count. Each real block carries `// SAFETY: ...`.
"lua-wasm"   = 19   # WASM import/export pointer ABI only. Host callbacks and
                    # exported alloc/run/error functions cross linear-memory
                    # pointer boundaries; the VM/runtime crates stay at zero.
"lua-wasm-smoke" = 17 # Non-published harness cdylib for the same WASM ABI
                      # surface. It exists to catch clean-checkout runtime
                      # regressions and is not a production runtime crate.
